<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirPulse | Live Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            height: 100%;
        }
        .nav-link { color: #94a3b8; transition: 0.3s; }
        .nav-link:hover { color: #38bdf8; }
        .nav-link.active { color: #38bdf8; font-weight: bold; border-bottom: 2px solid #38bdf8; }
        .stat-value { font-size: 2.8rem; font-weight: 800; transition: 0.5s; }
        .unit { font-size: 0.9rem; color: #64748b; text-transform: uppercase; }
        h6 { color: #94a3b8; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .navbar-brand { font-size: 1.5rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand navbar-dark border-bottom border-secondary mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">AirPulse</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/">Дашборд</a>
                <a class="nav-link" href="/archive">Архив БД</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3 mb-4">
            <div class="col-md">
                <div class="glass-card text-center p-3">
                    <h6>PM 1.0</h6>
                    <div id="val-pm1" class="stat-value">--</div>
                    <span class="unit">µg/m³</span>
                </div>
            </div>
            <div class="col-md">
                <div class="glass-card text-center p-3">
                    <h6>PM 2.5</h6>
                    <div id="val-pm25" class="stat-value">--</div>
                    <span class="unit">µg/m³</span>
                </div>
            </div>
            <div class="col-md">
                <div class="glass-card text-center p-3">
                    <h6>PM 10</h6>
                    <div id="val-pm10" class="stat-value">--</div>
                    <span class="unit">µg/m³</span>
                </div>
            </div>
            <div class="col-md">
                <div class="glass-card text-center p-3">
                    <h6>Температура</h6>
                    <div id="val-temp" class="stat-value" style="color: #fbbf24;">--</div>
                    <span class="unit">°C</span>
                </div>
            </div>
            <div class="col-md">
                <div class="glass-card text-center p-3">
                    <h6>Влажность</h6>
                    <div id="val-hum" class="stat-value" style="color: #34d399;">--</div>
                    <span class="unit">%</span>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="glass-card">
                    <h5>Динамика частиц (PM1, PM2.5, PM10)</h5>
                    <canvas id="pmChart"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="glass-card">
                    <h5>Климатические условия</h5>
                    <canvas id="climateChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pmChart, climateChart;

        async function updateData() {
            try {
                const res = await fetch('/api/latest');
                const data = await res.json();
                if (!data.length) return;

                const latest = data[0];

                // Обновляем виджеты с цветовой индикацией
                updateWidget('val-pm1', latest.pm1, 25, 50); // По аналогии с PM2.5
                updateWidget('val-pm25', latest.pm25, 25, 50);
                updateWidget('val-pm10', latest.pm10, 50, 100);
                document.getElementById('val-temp').innerText = latest.temp;
                document.getElementById('val-hum').innerText = latest.hum;

                // Готовим данные для графиков (разворачиваем массив)
                const labels = data.map(d => {
                    const timePart = d.received_at.includes('T') ? d.received_at.split('T')[1] : d.received_at.split(' ')[1];
                    return timePart.substring(0, 8);
                }).reverse();

                const pm1Data = data.map(d => d.pm1).reverse(); // Добавлено
                const pm25Data = data.map(d => d.pm25).reverse();
                const pm10Data = data.map(d => d.pm10).reverse();
                const tempData = data.map(d => d.temp).reverse();
                const humData = data.map(d => d.hum).reverse();

                if (!pmChart) {
                    initCharts(labels, pm1Data, pm25Data, pm10Data, tempData, humData);
                } else {
                    pmChart.data.labels = labels;
                    pmChart.data.datasets[0].data = pm1Data; // Обновлено
                    pmChart.data.datasets[1].data = pm25Data;
                    pmChart.data.datasets[2].data = pm10Data;
                    pmChart.update('none');

                    climateChart.data.labels = labels;
                    climateChart.data.datasets[0].data = tempData;
                    climateChart.data.datasets[1].data = humData;
                    climateChart.update('none');
                }
            } catch (err) {
                console.error("Ошибка загрузки данных:", err);
            }
        }

        function updateWidget(id, val, warn, crit) {
            const el = document.getElementById(id);
            // Обработка случая, если pm1 нет в базе (null)
            if (val === null || val === undefined) {
                el.innerText = "--";
                el.style.color = "#64748b";
                return;
            }
            el.innerText = val;
            if (val > crit) el.style.color = "#ef4444";      // Красный
            else if (val > warn) el.style.color = "#f59e0b"; // Оранжевый
            else el.style.color = "#38bdf8";                 // Голубой (норма)
        }

        function initCharts(labels, pm1, pm25, pm10, temp, hum) {
            const commonOptions = {
                responsive: true,
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                },
                plugins: { legend: { labels: { color: '#f8fafc', boxWidth: 12 } } }
            };

            pmChart = new Chart(document.getElementById('pmChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        // Добавлен датасет PM1.0
                        { label: 'PM 1.0', data: pm1, borderColor: '#f472b6', backgroundColor: 'rgba(244,114,182,0.1)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 2 },
                        { label: 'PM 2.5', data: pm25, borderColor: '#38bdf8', tension: 0.4, borderWidth: 2, pointRadius: 2 },
                        { label: 'PM 10', data: pm10, borderColor: '#818cf8', tension: 0.4, borderWidth: 2, pointRadius: 2 }
                    ]
                },
                options: commonOptions
            });

            climateChart = new Chart(document.getElementById('climateChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Температура', data: temp, borderColor: '#fbbf24', tension: 0.4, borderWidth: 2, pointRadius: 2 },
                        { label: 'Влажность', data: hum, borderColor: '#34d399', tension: 0.4, borderWidth: 2, pointRadius: 2 }
                    ]
                },
                options: commonOptions
            });
        }

        setInterval(updateData, 5000); // Обновление каждые 5 сек
        updateData();
    </script>
</body>
</html>
